<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapids Water Warriors Rafting | Contact us</title>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="description"
      content="Learn about White Water Warriors Rafting, our history, mission, and passion for delivering unforgettable whitewater adventures.">
    <meta name="author" content="Jessie Mae Pabatang">
</head>

<body>
    <header>
        <img src="images/raftinglogo.jpeg" alt="Rafting Logo" width="100">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="company-info">
            <section>
                <h1>Rapids Water Rafting Company</h1>
                <p>123 Main River Street</p>
                <p>Cebu City, Cebu Philippines</p>
                <p>+63 999 999 9999</p>
                <p>rapidswaterrafting@gmail.com</p>
            </section>
        </div>

        <div class="contact-container">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15700.780483511657!2d123.89693215000001!3d10.3262643!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sph!4v1775320656528!5m2!1sen!2sph"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="contact-form">
                <form>

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Placeholder">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Placeholder">

                    <div class="radio-group">
                        <label>
                            <input type="radio" id="general" name="purpose" value="general">
                            General Inquiry
                        </label>

                        <label>
                            <input type="radio" id="reservation" name="purpose" value="reservation">
                            Reservation Question
                        </label>

                        <label>
                            <input type="radio" id="suggestion" name="purpose" value="suggestion">
                            Website Suggestion
                        </label>
                    </div>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type here"></textarea>

                    <div class="checkbox-row">
                        <label>
                            <input type="checkbox" id="subscribe" name="subscribe">
                            Please subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
            <div>

                <section class="employees">
                    <h2>Meet Our Team</h2>

                    <div class="employee-grid">
                        <figure>
                            <img src="images/employee2.jpeg" alt="Operations Manager">
                            <figcaption>Jessie Mae Pabatang – Operations Manager
                            </figcaption>
                        </figure>
                        <figure>
                            <img src="images/employee1.jpeg" alt="Safety Instructor">
                            <figcaption>Thy Vo – Safety Instructor</figcaption>
                        </figure>

                        <figure>
                            <img src="images/employee3.jpeg" alt="Senior River Guide">
                            <figcaption>Dao Sam – Senior River Guide</figcaption>
                        </figure>
                    </div>
                </section>
    </main>
    <footer>
        <p>©️ 2026 | Jessie Mae Pabatang | Cebu City, Philippines</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon" width="30">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="LinkedIn Icon" width="30">
            </a>
            <a href="https://whatsapp.com">
                <img src="images/whatsapp.png" alt="Whatsapp Icon" width="30">
            </a>
        </nav>
    </footer>
</body>

</html>
